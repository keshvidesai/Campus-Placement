<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skill Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0D1117;
            font-family: 'Segoe UI', sans-serif;
        }

        #map {
            width: 100vw;
            height: 65vh;
        }

        #info-panel {
            background: #161B22;
            padding: 16px 20px;
            color: #fff;
            min-height: 35vh;
            overflow-y: auto;
        }

        #info-panel h2 {
            font-size: 18px;
            color: #00E5FF;
            margin-bottom: 12px;
        }

        #info-panel .skill-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #21262D;
        }

        #info-panel .skill-item:last-child {
            border-bottom: none;
        }

        #info-panel .skill-name {
            flex: 1;
            font-size: 14px;
            color: #C9D1D9;
        }

        #info-panel .skill-score {
            font-size: 13px;
            color: #6C63FF;
            font-weight: bold;
            margin-left: 8px;
        }

        .bar-bg {
            width: 80px;
            height: 6px;
            background: #21262D;
            border-radius: 3px;
            margin-left: 8px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #6C63FF, #00E5FF);
        }

        #info-panel .hint {
            color: #6E7681;
            font-size: 13px;
            text-align: center;
            padding: 20px;
        }

        /* Circle label on map */
        .region-circle-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
        }

        .region-circle-label .city-name {
            font-size: 11px;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.9);
        }

        .region-circle-label .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            justify-content: center;
            max-width: 130px;
        }

        .region-circle-label .skill-tag {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            white-space: nowrap;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <div id="info-panel">
        <p class="hint" id="default-hint">📍 Tap a city circle to see all trending skills in that region</p>
        <div id="skills-list" style="display:none;">
            <h2 id="region-title"></h2>
            <div id="skills-container"></div>
        </div>
    </div>

    <script>
        var map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([22.0, 79.0], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 18
        }).addTo(map);

        var regionColors = {
            'Bangalore': { bg: 'rgba(108,99,255,0.25)', border: '#6C63FF', tag: 'rgba(108,99,255,0.85)' },
            'Mumbai': { bg: 'rgba(0,229,255,0.22)', border: '#00E5FF', tag: 'rgba(0,180,210,0.85)' },
            'Pune': { bg: 'rgba(63,185,80,0.22)', border: '#3FB950', tag: 'rgba(46,160,67,0.85)' },
            'Hyderabad': { bg: 'rgba(240,136,62,0.22)', border: '#F0883E', tag: 'rgba(210,120,50,0.85)' },
            'Delhi NCR': { bg: 'rgba(248,81,73,0.22)', border: '#F85149', tag: 'rgba(220,60,55,0.85)' },
            'Chennai': { bg: 'rgba(88,166,255,0.22)', border: '#58A6FF', tag: 'rgba(60,140,230,0.85)' },
            'Kolkata': { bg: 'rgba(210,153,34,0.22)', border: '#D2991F', tag: 'rgba(190,140,30,0.85)' },
            'Ahmedabad': { bg: 'rgba(163,113,247,0.22)', border: '#A371F7', tag: 'rgba(140,95,220,0.85)' },
            'Jaipur': { bg: 'rgba(219,171,255,0.22)', border: '#DBABFF', tag: 'rgba(180,130,230,0.85)' },
            'Kochi': { bg: 'rgba(121,192,255,0.22)', border: '#79C0FF', tag: 'rgba(90,160,230,0.85)' },
            'Indore': { bg: 'rgba(238,119,119,0.22)', border: '#EE7777', tag: 'rgba(210,90,90,0.85)' },
            'Noida': { bg: 'rgba(255,166,87,0.22)', border: '#FFA657', tag: 'rgba(220,140,60,0.85)' },
            'Coimbatore': { bg: 'rgba(126,231,135,0.22)', border: '#7EE787', tag: 'rgba(80,190,90,0.85)' },
            'Thiruvananthapuram': { bg: 'rgba(255,138,128,0.22)', border: '#FF8A80', tag: 'rgba(230,100,90,0.85)' },
            'Chandigarh': { bg: 'rgba(128,203,196,0.22)', border: '#80CBC4', tag: 'rgba(80,170,160,0.85)' }
        };

        var regionCoords = {
            'Bangalore': { lat: 12.97, lng: 77.59, radius: 45000 },
            'Mumbai': { lat: 19.08, lng: 72.88, radius: 42000 },
            'Pune': { lat: 18.52, lng: 73.86, radius: 35000 },
            'Hyderabad': { lat: 17.39, lng: 78.49, radius: 42000 },
            'Delhi NCR': { lat: 28.61, lng: 77.21, radius: 45000 },
            'Chennai': { lat: 13.08, lng: 80.27, radius: 40000 },
            'Kolkata': { lat: 22.57, lng: 88.36, radius: 42000 },
            'Ahmedabad': { lat: 23.02, lng: 72.57, radius: 38000 },
            'Jaipur': { lat: 26.91, lng: 75.79, radius: 38000 },
            'Kochi': { lat: 9.93, lng: 76.27, radius: 35000 },
            'Indore': { lat: 22.72, lng: 75.86, radius: 35000 },
            'Noida': { lat: 28.54, lng: 77.39, radius: 30000 },
            'Coimbatore': { lat: 11.02, lng: 76.96, radius: 35000 },
            'Thiruvananthapuram': { lat: 8.52, lng: 76.94, radius: 35000 },
            'Chandigarh': { lat: 30.73, lng: 76.78, radius: 38000 }
        };

        var circlesLayer = [];
        var labelsLayer = [];

        function loadRegions(regionsJson) {
            var regions = JSON.parse(regionsJson);

            regions.forEach(function (region) {
                if (region.name === 'Global') return; // Skip global — no map location

                var coords = regionCoords[region.name];
                if (!coords) return;

                var colors = regionColors[region.name] || regionColors['Bangalore'];

                // Draw glowing circle on map
                var circle = L.circle([coords.lat, coords.lng], {
                    radius: coords.radius,
                    fillColor: colors.border,
                    fillOpacity: 0.15,
                    color: colors.border,
                    weight: 2,
                    opacity: 0.6
                }).addTo(map);

                // Pulsing inner circle
                var innerCircle = L.circle([coords.lat, coords.lng], {
                    radius: coords.radius * 0.4,
                    fillColor: colors.border,
                    fillOpacity: 0.3,
                    color: colors.border,
                    weight: 1,
                    opacity: 0.4
                }).addTo(map);

                // Build skill tags HTML (show top 3 skills)
                var topSkills = region.topSkills ? region.topSkills.slice(0, 3) : [];
                var tagsHtml = '';
                topSkills.forEach(function (skill) {
                    tagsHtml += '<span class="skill-tag" style="background:' + colors.tag + '">' + skill + '</span>';
                });

                // Create label overlay
                var labelHtml = '<div class="region-circle-label">' +
                    '<div class="city-name" style="color:' + colors.border + '">' + region.name + '</div>' +
                    '<div class="skill-tags">' + tagsHtml + '</div>' +
                    '</div>';

                var label = L.divIcon({
                    className: '',
                    html: labelHtml,
                    iconSize: [140, 70],
                    iconAnchor: [70, 35]
                });

                var labelMarker = L.marker([coords.lat, coords.lng], {
                    icon: label,
                    interactive: true
                }).addTo(map);

                // Click handler — load full skills for this region
                circle.on('click', function () { selectRegion(region.name); });
                innerCircle.on('click', function () { selectRegion(region.name); });
                labelMarker.on('click', function () { selectRegion(region.name); });

                circlesLayer.push(circle, innerCircle);
                labelsLayer.push(labelMarker);
            });
        }

        function selectRegion(regionName) {
            // Zoom into the region
            var coords = regionCoords[regionName];
            if (coords) {
                map.flyTo([coords.lat, coords.lng], 8, { duration: 0.8 });
            }

            // Call Android to fetch full skill data
            if (window.Android) {
                window.Android.onRegionSelected(regionName);
            }
        }

        function displayRegionSkills(regionName, skillsJson) {
            var skills = JSON.parse(skillsJson);
            document.getElementById('default-hint').style.display = 'none';
            document.getElementById('skills-list').style.display = 'block';
            document.getElementById('region-title').textContent = '📍 ' + regionName + ' — Top Skills';

            var container = document.getElementById('skills-container');
            container.innerHTML = '';

            skills.forEach(function (skill) {
                var div = document.createElement('div');
                div.className = 'skill-item';
                div.innerHTML = '<span class="skill-name">' + skill.skillName + '</span>' +
                    '<span class="skill-score">' + Math.round(skill.demandScore) + '%</span>' +
                    '<div class="bar-bg"><div class="bar-fill" style="width:' + skill.demandScore + '%"></div></div>';
                container.appendChild(div);
            });
        }
    </script>
</body>

</html>
