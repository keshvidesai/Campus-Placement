<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skill Roadmap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0D1117;
            font-family: 'Segoe UI', sans-serif;
            color: #C9D1D9;
            padding: 16px;
            overflow-y: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 22px;
            color: #00E5FF;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #8B949E;
        }

        .progress-bar-container {
            background: #21262D;
            border-radius: 10px;
            height: 10px;
            margin: 12px 0 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6C63FF, #00E5FF);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #8B949E;
            text-align: center;
        }

        /* Vertical timeline */
        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 14px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, #6C63FF 0%, #00E5FF 50%, #3FB950 100%);
        }

        .phase {
            margin-bottom: 28px;
            position: relative;
        }

        .phase-dot {
            position: absolute;
            left: -23px;
            top: 4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid #6C63FF;
            background: #0D1117;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .phase.completed .phase-dot {
            background: #3FB950;
            border-color: #3FB950;
            box-shadow: 0 0 8px rgba(63, 185, 80, 0.5);
        }

        .phase-title {
            font-size: 16px;
            font-weight: 700;
            color: #E6EDF3;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .phase-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            background: rgba(108, 99, 255, 0.2);
            color: #6C63FF;
            font-weight: 600;
        }

        .phase.completed .phase-badge {
            background: rgba(63, 185, 80, 0.2);
            color: #3FB950;
        }

        .step {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            margin: 6px 0;
            background: #161B22;
            border-radius: 10px;
            border: 1px solid #21262D;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .step:active {
            transform: scale(0.98);
        }

        .step:hover {
            border-color: #30363D;
            background: #1C2129;
        }

        .step.completed {
            border-color: rgba(63, 185, 80, 0.3);
            background: rgba(63, 185, 80, 0.08);
        }

        .step-check {
            width: 22px;
            height: 22px;
            min-width: 22px;
            border-radius: 6px;
            border: 2px solid #30363D;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .step.completed .step-check {
            background: #3FB950;
            border-color: #3FB950;
            color: #fff;
        }

        .step-name {
            font-size: 14px;
            color: #C9D1D9;
            flex: 1;
        }

        .step.completed .step-name {
            color: #8B949E;
            text-decoration: line-through;
        }

        /* Animations */
        @keyframes checkPop {
            0% {
                transform: scale(0.5);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .step.just-completed .step-check {
            animation: checkPop 0.3s ease;
        }

        .no-roadmap {
            text-align: center;
            padding: 60px 20px;
            color: #8B949E;
        }

        .no-roadmap h2 {
            color: #E6EDF3;
            margin-bottom: 8px;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div id="roadmap-container"></div>

    <script>
        var completedSteps = [];
        var totalSteps = 0;

        function loadRoadmap(roadmapJson, progressJson) {
            var roadmap = JSON.parse(roadmapJson);
            var progress = JSON.parse(progressJson);
            completedSteps = progress || [];

            var container = document.getElementById('roadmap-container');

            // Count total steps
            totalSteps = 0;
            roadmap.phases.forEach(function (phase) {
                totalSteps += phase.steps.length;
            });

            // Build HTML
            var html = '<div class="header">';
            html += '<h1>📚 ' + roadmap.skill + ' Roadmap</h1>';
            html += '<p>' + roadmap.description + '</p>';
            html += '<div class="progress-bar-container"><div class="progress-bar-fill" id="progress-fill" style="width:' + getProgressPercent() + '%"></div></div>';
            html += '<div class="progress-text" id="progress-text">' + completedSteps.length + ' / ' + totalSteps + ' completed (' + Math.round(getProgressPercent()) + '%)</div>';
            html += '</div>';

            html += '<div class="timeline">';

            roadmap.phases.forEach(function (phase, phaseIndex) {
                var phaseCompleted = phase.steps.every(function (step) {
                    return completedSteps.indexOf(step) !== -1;
                });

                var phaseCompletedCount = phase.steps.filter(function (step) {
                    return completedSteps.indexOf(step) !== -1;
                }).length;

                html += '<div class="phase' + (phaseCompleted ? ' completed' : '') + '" id="phase-' + phaseIndex + '">';
                html += '<div class="phase-dot"></div>';
                html += '<div class="phase-title">' + phase.title;
                html += '<span class="phase-badge">' + phaseCompletedCount + '/' + phase.steps.length + '</span>';
                html += '</div>';

                phase.steps.forEach(function (step) {
                    var isCompleted = completedSteps.indexOf(step) !== -1;
                    html += '<div class="step' + (isCompleted ? ' completed' : '') + '" onclick="toggleStep(this, \'' + escapeHtml(step) + '\')">';
                    html += '<div class="step-check">' + (isCompleted ? '✓' : '') + '</div>';
                    html += '<span class="step-name">' + step + '</span>';
                    html += '</div>';
                });

                html += '</div>';
            });

            html += '</div>';

            container.innerHTML = html;
        }

        function toggleStep(el, stepName) {
            var idx = completedSteps.indexOf(stepName);
            if (idx === -1) {
                completedSteps.push(stepName);
                el.classList.add('completed', 'just-completed');
                el.querySelector('.step-check').textContent = '✓';
                setTimeout(function () { el.classList.remove('just-completed'); }, 400);
            } else {
                completedSteps.splice(idx, 1);
                el.classList.remove('completed', 'just-completed');
                el.querySelector('.step-check').textContent = '';
            }

            updateProgress();
            updatePhases();

            // Save progress to Android
            if (window.Android) {
                window.Android.onProgressChanged(JSON.stringify(completedSteps));
            }
        }

        function updateProgress() {
            var pct = getProgressPercent();
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-text').textContent =
                completedSteps.length + ' / ' + totalSteps + ' completed (' + Math.round(pct) + '%)';
        }

        function updatePhases() {
            // Re-check each phase's completed status
            var phases = document.querySelectorAll('.phase');
            phases.forEach(function (phaseEl) {
                var steps = phaseEl.querySelectorAll('.step');
                var allDone = true;
                var doneCount = 0;
                steps.forEach(function (s) {
                    if (s.classList.contains('completed')) doneCount++;
                    else allDone = false;
                });
                if (allDone && steps.length > 0) phaseEl.classList.add('completed');
                else phaseEl.classList.remove('completed');

                var badge = phaseEl.querySelector('.phase-badge');
                if (badge) badge.textContent = doneCount + '/' + steps.length;
            });
        }

        function getProgressPercent() {
            if (totalSteps === 0) return 0;
            return (completedSteps.length / totalSteps) * 100;
        }

        function escapeHtml(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function showNoRoadmap(skillName) {
            var container = document.getElementById('roadmap-container');
            container.innerHTML = '<div class="no-roadmap"><h2>🚧 Coming Soon</h2><p>Roadmap for "' + skillName + '" is not available yet.</p></div>';
        }
    </script>
</body>

</html>
